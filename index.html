  .sidebar-title {

    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
  }
  .sidebar-subtitle {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;

    font-family: sans-serif;
    color: var(--text2);

    border: none;

    text-align: left;

    min-height: 100vh;

    background: var(--bg);

    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;

    color: var(--text);

    color: var(--text3);
    font-family: sans-serif;
    margin-bottom: 4px;

    justify-content: space-between;

    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

    padding: 2rem 2.5rem 4rem;
    max-width: 860px;

  .day-page.active { display: block; }

    margin-bottom: 0.25rem;

    color: var(--accent);

    line-height: 1;

    background: var(--border);

    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);

    display: flex;
    align-items: center;
    gap: 0.5rem;

    color: var(--text3);
    font-family: sans-serif;

    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;

    background: none;
    font-size: 11px;
    color: transparent;

    font-family: sans-serif;

const state = JSON.parse(localStorage.getItem('45day_v2') || '{}');
function save() { localStorage.setItem('45day_v2', JSON.stringify(state)); }

function getDay(d) { return state[`d${d}`] || {}; }
function setDay(d, obj) { state[`d${d}`] = obj; save(); updateProgress(); }

function isDayDone(d) {
  const s = getDay(d);
  return s.water && s.philosophy && s.spanish && s.geo && s.politics && s.workout && s.podcast;
}

function updateProgress() {
  let done = 0;
  for (let i = 1; i <= 45; i++) if (isDayDone(i)) done++;
  document.getElementById('progress-pct').textContent = done + ' / 45 days';
  document.getElementById('progress-fill').style.width = Math.round((done/45)*100) + '%';
  document.getElementById('ov-done').textContent = done;

  let streak = 0;
  for (let i = 1; i <= 45; i++) {
    if (isDayDone(i)) streak++; else break;
  }
  document.getElementById('ov-streak').textContent = streak + ' 🔥';

  document.querySelectorAll('.day-btn[data-day]').forEach(btn => {
    const d = parseInt(btn.dataset.day);
    btn.classList.toggle('done', isDayDone(d));
    btn.querySelector('.dot').style.background = isDayDone(d) ? 'var(--green)' : 'var(--text3)';
  });

  const grid = document.getElementById('overview-grid-container');
  if (grid) {
    grid.querySelectorAll('.overview-day-btn').forEach(btn => {
      const d = parseInt(btn.dataset.day);
      btn.classList.toggle('done', isDayDone(d));
    });
  }
}

function showOverview() {
  document.querySelectorAll('.day-page').forEach(p => p.classList.remove('active'));
  document.getElementById('overview-page').classList.add('active');
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('overview-btn').classList.add('active');
  updateProgress();
}

function showDay(d) {
  document.querySelectorAll('.day-page').forEach(p => p.classList.remove('active'));
  document.getElementById('overview-page').classList.remove('active');
  const page = document.getElementById(`day-page-${d}`);
  if (page) page.classList.add('active');
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.day-btn[data-day="${d}"]`);
  if (btn) btn.classList.add('active');
  window.scrollTo(0, 0);
}

function toggleCheck(dayNum, key, el) {
  const s = getDay(dayNum);
  s[key] = !s[key];
  setDay(dayNum, s);
  el.classList.toggle('checked', !!s[key]);
  const card = el.closest('.habit-card');
  if (card) {
    const allCbs = card.querySelectorAll('.cb');
    const allDone = Array.from(allCbs).every(c => c.classList.contains('checked'));
    card.classList.toggle('completed', allDone);
  }
}

function saveNote(dayNum, key, val) {
  const s = getDay(dayNum);
  s[key] = val;
  setDay(dayNum, s);
}

function buildSidebar() {
  const nav = document.getElementById('weeks-nav');
  const weeks = [
    [1,7,"Week 1 — The Foundation"],
    [8,14,"Week 2 — Ancient Wisdom"],
    [15,21,"Week 3 — Modern Thought"],
    [22,28,"Week 4 — Existentialism"],
    [29,35,"Week 5 — Transcendentalism"],
    [36,42,"Week 6 — Synthesis"],
    [43,45,"Final Push"]
  ];
  weeks.forEach(([start,end,label], wi) => {
    const wr = document.createElement('div');
    wr.className = 'sidebar-week';
    const wh = document.createElement('button');
    wh.className = 'week-header';
    wh.innerHTML = `<span>${label}</span><span style="font-size:10px;opacity:.5">▾</span>`;
    const wd = document.createElement('div');
    wd.className = 'week-days' + (wi === 0 ? ' open' : '');
    wh.onclick = () => wd.classList.toggle('open');
    for (let d = start; d <= end; d++) {
      const db = document.createElement('button');
      db.className = 'day-btn';
      db.dataset.day = d;
      db.innerHTML = `<span class="dot"></span> Day ${d}`;
      db.onclick = () => showDay(d);
      wd.appendChild(db);
    }
    wr.appendChild(wh);
    wr.appendChild(wd);
    nav.appendChild(wr);
  });
}

function buildOverviewGrid() {
  const cont = document.getElementById('overview-grid-container');
  const weeks = [
    [1,7,"Week 1 — The Foundation"],
    [8,14,"Week 2 — Ancient Wisdom"],
    [15,21,"Week 3 — Modern Thought"],
    [22,28,"Week 4 — Existentialism"],
    [29,35,"Week 5 — Transcendentalism"],
    [36,42,"Week 6 — Synthesis"],
    [43,45,"Final Push"]
  ];
  weeks.forEach(([start,end,label]) => {
    const wl = document.createElement('div');
    wl.className = 'week-label';
    wl.textContent = label;
    cont.appendChild(wl);
    const grid = document.createElement('div');
    grid.className = 'overview-grid';
    for (let d = start; d <= end; d++) {
      const btn = document.createElement('div');
      btn.className = 'overview-day-btn';
      btn.dataset.day = d;
      btn.innerHTML = `<div class="overview-day-num">${d}</div><div class="overview-day-label">Day ${d}</div>`;
      btn.onclick = () => showDay(d);
      grid.appendChild(btn);
    }
    cont.appendChild(grid);
  });
}
